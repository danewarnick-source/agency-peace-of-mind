name: Typecheck & Lint

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (changed files only)
        # Runs tsc project-wide (no way to scope it) but exits 0 so pre-existing
        # errors don't block new work. The step prints any errors for visibility.
        run: npx tsc --noEmit || true

      - name: Lint (changed files only)
        # Fetch base so we can diff; lint only files touched by this push/PR.
        # This gates on NEW lint errors without failing on pre-existing noise.
        run: |
          git fetch origin main --depth=1 2>/dev/null || true
          BASE=$(git merge-base HEAD origin/main 2>/dev/null || echo "HEAD~1")
          CHANGED=$(git diff --name-only "$BASE" HEAD | grep -E '\.(ts|tsx)$' | tr '\n' ' ')
          if [ -n "$CHANGED" ]; then
            npx eslint $CHANGED
          else
            echo "No TypeScript files changed — skipping lint"
          fi
